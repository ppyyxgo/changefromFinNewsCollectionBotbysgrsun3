name: Daily News Analysis

on:
  schedule:
    # 每天北京时间上午 9:00 执行 (UTC 时间 01:00)
    - cron: '01 16 * * *'
  workflow_dispatch: # 允许手动触发
    inputs:
      debug:
        description: '启用调试模式'
        required: false
        default: 'false'

jobs:
  analyze-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 安装必要的系统依赖
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev python3-dev

      - name: Create .env file
        run: |
          echo "ZhipuAI_API_KEY=${{ secrets.ZhipuAI_API_KEY }}" >> .env
          echo "SERVER_CHAN_KEYS=${{ secrets.SERVER_CHAN_KEYS }}" >> .env
          cat .env

      - name: Run news analysis script
        env:
          TZ: Asia/Shanghai
        run: |
          python financebot.py
          echo "脚本执行完成"

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-analysis-report
          path: |
            *.txt
            logs/
          retention-days: 7

      - name: Send Slack notification on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#notifications'
          author_name: GitHub Actions Bot
          success_message: ':white_check_mark: 任务执行成功'
          cancelled_message: ':warning: 任务已取消'
          failure_message: ':no_entry: 任务执行失败'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
